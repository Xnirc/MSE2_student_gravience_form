<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grievance Management System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Auth View -->
        <div id="auth-view" class="view">
            <div class="auth-container">
                <h1 class="text-center text-primary">Student Portal</h1>
                <p class="text-center text-secondary mb-4">Grievance Management System</p>
                
                <div class="auth-tabs">
                    <button class="tab-btn active" id="login-tab" onclick="switchTab('login')">Login</button>
                    <button class="tab-btn" id="register-tab" onclick="switchTab('register')">Register</button>
                </div>

                <!-- Login Form -->
                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" required placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required placeholder="Enter your password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>

                <!-- Register Form -->
                <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="reg-name">Name</label>
                        <input type="text" id="reg-name" required placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" required placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" required placeholder="Create a password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Register</button>
                </form>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="view hidden">
            <header class="header">
                <div class="container d-flex justify-between align-center">
                    <h2 class="m-0 text-white">My Grievances</h2>
                    <button onclick="handleLogout()" class="btn btn-outline text-white">Logout</button>
                </div>
            </header>

            <main class="container py-4">
                <div class="dashboard-grid">
                    <!-- Submit Form -->
                    <div class="card">
                        <h3>Submit New Grievance</h3>
                        <form id="grievance-form" onsubmit="handleSubmitGrievance(event)">
                            <div class="form-group">
                                <label for="g-title">Title</label>
                                <input type="text" id="g-title" required placeholder="Grievance Title">
                            </div>
                            <div class="form-group">
                                <label for="g-category">Category</label>
                                <select id="g-category" required>
                                    <option value="" disabled selected>Select a category</option>
                                    <option value="Academic">Academic</option>
                                    <option value="Hostel">Hostel</option>
                                    <option value="Transport">Transport</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="g-desc">Description</label>
                                <textarea id="g-desc" required rows="4" placeholder="Describe your issue..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Submit Grievance</button>
                        </form>
                    </div>

                    <!-- Grievance List -->
                    <div class="card">
                        <div class="d-flex justify-between align-center mb-3 flex-wrap gap-2">
                            <h3 class="m-0">Your Complaints</h3>
                            <div class="search-box">
                                <input type="text" id="search-input" placeholder="Search by title..." onkeyup="handleSearch()">
                                <button class="btn btn-sm btn-secondary" onclick="handleSearch()">Search</button>
                            </div>
                        </div>
                        <div id="grievance-list" class="grievance-list">
                            <!-- Grievances will be injected here -->
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal hidden">
        <div class="modal-content card">
            <div class="d-flex justify-between align-center mb-3">
                <h3 class="m-0">Update Grievance</h3>
                <span class="close-btn" onclick="closeEditModal()">&times;</span>
            </div>
            <form id="edit-grievance-form" onsubmit="handleUpdateGrievance(event)">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label for="edit-title">Title</label>
                    <input type="text" id="edit-title" required>
                </div>
                <div class="form-group">
                    <label for="edit-category">Category</label>
                    <select id="edit-category" required>
                        <option value="Academic">Academic</option>
                        <option value="Hostel">Hostel</option>
                        <option value="Transport">Transport</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="edit-desc">Description</label>
                    <textarea id="edit-desc" required rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label for="edit-status">Status (For admin/testing only)</label>
                    <select id="edit-status">
                        <option value="Pending">Pending</option>
                        <option value="Resolved">Resolved</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100">Save Changes</button>
            </form>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast hidden"></div>

    <script src="script.js"></script>
</body>
</html>
